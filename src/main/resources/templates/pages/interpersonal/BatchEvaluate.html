<!DOCTYPE html>
<html xml:th="https://www.thymeleaf.org">
<head th:replace="~{components/Header :: head('Batch Evaluate')}"></head>
<body class="bg-2 text-1" data-bs-theme="dark">
<div th:replace="~{components/Navigation :: vertical}"></div>

<main class="d-flex flex-column" style="height: 100vh; margin-left: 62px">
    <nav class="py-2 px-2" style="background: linear-gradient(#222, #333); border-bottom: 1px #495057 solid;">
        <div class="row m-0">
            <div class="col-md-12 d-flex flex-row align-items-center justify-content-between">
                <div class="d-flex flex-row align-items-center justify-content-start gap-2">
                    <img class="square-image" style="height: 50px; width: 50px" alt="Feature image"
                         th:src="@{/icons/Batch Evaluate.svg}">
                    <h1 class="fw-bold m-0">Batch Evaluate</h1>
                </div>

                <div class="col-md-2 d-flex flex-row m-0 align-items-center justify-content-end gap-3">
                    <div>
                        <div class="spinner-border d-none" role="status" id="loading-spinner">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <img src="/icons/Error.svg" id="error-icon" alt="error" class="profile-image d-none" height="32px"/>
                    </div>
                    <label for="evaluation-date" class="text-nowrap">Evaluation Date</label>
                    <input type="datetime-local" class="form-control" id="evaluation-date" name="evaluation date">
                </div>
            </div>
        </div>
    </nav>

    <div class="d-flex flex-row flex-grow-1 overflow-hidden" style="min-height: 0;">
        <div class="border-end d-none d-lg-flex flex-column p-0" style="width: 25%;">
            <div class="flex-grow-1 d-flex flex-column border-bottom p-0 overflow-y-auto" id="member-list">



            </div>
            <div class="d-flex flex-row align-items-center justify-content-between p-2">
                <p class="fw-bold m-0 p-0" id="counts">loading</p>
                <div class="d-flex flex-row align-items-center justify-content-between gap-2">
                    <button type="button" id="btn-archive" class="btn btn-secondary" data-bs-toggle="button">A</button>
                    <button type="button" id="btn-hold" class="btn btn-secondary" data-bs-toggle="button">H</button>
                </div>
            </div>
        </div>

        <!-- Context Panel -->
        <div class="border-end d-flex flex-column p-0 overflow-hidden" style="flex: 1; min-height: 0;">
            <div class="w-100 d-flex flex-row align-items-center justify-content-between border-bottom p-2" style="background-image: linear-gradient(to right, rgba(9, 188, 138, .5) 0%, rgba(9, 188, 138, 0))">
                <div class="d-flex flex-row align-items-center justify-content-start gap-3">
                    <img src="https://eventstar.costionline.com/icons/Logo.svg" class="square-image img-fluid" style="height: 60px; width: 60px;" alt="profile image" id="context-profile-image" />
                    <p class="fw-bold fs-2 m-0" id="context-title">Loading...</p>
                </div>
                <a target="_blank" id="context-view-profile"><button type="button" class="btn btn-secondary">View Profile</button></a>
            </div>

            <div class="flex-grow-1 overflow-y-auto" style="min-height: 0;">
                <div class="position-relative">
                    <div class="position-absolute p-2" style="top: 0; right: 0;">
                        <div class="bg-light-subtle d-flex justify-content-center align-items-center p-2" role="button" onclick="evalChartEval.resetZoom()">
                            <img class="square-image" src="/icons/Reset Zoom.svg" alt="Reset" style="width: 20px;">
                        </div>
                    </div>
                    <canvas id="score-canvas" class="mb-5"></canvas>
                </div>

                <div class="d-flex flex-row-reverse overflow-x-auto pb-3" id="score-container"></div>

                <!-- Timeline/Network section -->
                <div>
                    <ul class="nav nav-tabs" id="myTab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="timeline-tab" data-bs-toggle="tab" data-bs-target="#timeline" type="button" role="tab" aria-controls="timeline" aria-selected="true">Timeline</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="network-tab" data-bs-toggle="tab" data-bs-target="#network" type="button" role="tab" aria-controls="network" aria-selected="false">Network</button>
                        </li>
                    </ul>
                    <div class="tab-content" id="myTabContent">
                        <div class="tab-pane fade show active" id="timeline" role="tabpanel" aria-labelledby="timeline-tab">
                            <h3 class="fw-bold border-bottom p-2 mb-4">Evaluations & Events</h3>

                            <div class="px-4 d-flex flex-column">

                                <div class="border-start ps-4 position-relative">
                                    <div class="my-4">
                                        <div class="border d-flex flex-column my-1 p-3 gap-3">
                                            <div class="d-flex flex-row align-items-center justify-content-between">
                                                <h5 class="fw-bold p-0 m-0">Event Name</h5>
                                                <p class="m-0 p-0">1/1/2022</p>
                                            </div>
                                            <p class="p-0 m-0">Terence</p>
                                        </div>
                                    </div>
                                    <div class="rounded-5 position-absolute bg-light" style="width: 10px;aspect-ratio: 1/1;left: 0;top: 50%;transform: translate(-50%, -50%);"></div>
                                </div>

                                <div class="border-start ps-4 position-relative">
                                    <div class="my-4">
                                        <div class="border d-flex flex-column my-1 p-3 gap-3">
                                            <div class="d-flex flex-row align-items-center justify-content-between">
                                                <h5 class="fw-bold p-0 m-0">Event Name</h5>
                                                <p class="m-0 p-0">1/1/2022</p>
                                            </div>
                                            <p class="p-0 m-0">Terence</p>
                                        </div>
                                    </div>
                                    <div class="rounded-5 position-absolute bg-light" style="width: 10px;aspect-ratio: 1/1;left: 0;top: 50%;transform: translate(-50%, -50%);"></div>
                                </div>

                                <div class="border-start ps-4 position-relative">
                                    <div class="my-4">
                                        <div class="border d-flex flex-column my-1 p-3 gap-3">
                                            <div class="d-flex flex-row align-items-center justify-content-between">
                                                <h5 class="fw-bold p-0 m-0">Event Name</h5>
                                                <p class="m-0 p-0">1/1/2022</p>
                                            </div>
                                            <p class="p-0 m-0">Terence</p>
                                        </div>
                                    </div>
                                    <div class="rounded-5 position-absolute bg-light" style="width: 10px;aspect-ratio: 1/1;left: 0;top: 50%;transform: translate(-50%, -50%);"></div>
                                </div>

                            </div>

                        </div>
                        <div class="tab-pane fade" id="network" role="tabpanel" aria-labelledby="network-tab">
                            <h3 class="fw-bold border-bottom p-2 mb-4">Network</h3>

                            <div class="position-relative" id="graph-container-wrapper">
                                <div id="graph-container" style="height: 400px"></div>
                                <div class="position-absolute bottom-0 end-0 bg-body-tertiary p-2 m-2 d-flex flex-row gap-2">
                                    <button type="button" class="btn bg-light-subtle d-flex justify-content-center align-items-center p-2" data-bs-toggle="tooltip" data-bs-title="Reset View" onclick="cy.reset()">
                                        <img class="square-image" src="/icons/Reset%20Zoom.svg" alt="refresh" style="width: 20px;">
                                    </button>
                                    <button type="button" class="btn bg-light-subtle d-flex justify-content-center align-items-center p-2" data-bs-toggle="modal" data-bs-target="#graph-modal">
                                        <img class="square-image" src="/icons/Settings.svg" alt="refresh" style="width: 20px;">
                                    </button>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Evaluation Panel -->
        <div class="d-flex flex-column p-0" style="width: 25%">
            <div class="flex-grow-1 d-flex flex-column gap-2 border-bottom p-2 overflow-y-auto">
                <h3 class="fw-bold m-0">New Evaluation</h3>
                <div class="">
                    <label for="score-input" class="form-label mt-3">Score</label>
                    <input type="text" class="form-control" id="score-input" placeholder="0" required>
                </div>
                <div class="">
                    <label for="note-input" class="form-label mt-3">Note</label>
                    <textarea class="form-control" id="note-input" rows="3"></textarea>
                </div>
            </div>
            <div class="bottom-0 d-flex flex-row align-items-center justify-content-between p-2">
                <button type="button" class="btn btn-secondary" onclick="dequeue()">Dequeue</button>
                <div class="d-flex flex-row align-items-center justify-content-between gap-2">
                    <button type="button" class="btn btn-primary" onclick="saveEvaluation()">Save</button>
                    <button type="button" class="btn btn-primary" onclick="chooseNext()">Save & Dequeue</button>
                </div>
            </div>
        </div>
    </div>
</main>


<div th:replace="~{components/External :: external}"></div>
<div th:replace="~{components/Toast :: toast}"></div>
<div th:replace="~{components/Formatting :: date-formatting}"></div>
<div th:replace="~{components/Formatting :: time-formatting}"></div>
<div th:replace="~{components/External :: tooltips}"></div>
<div th:replace="~{components/Toast :: toast}"></div>
<div th:replace="~{components/Network :: network}"></div>
<script>
    // UI components
    let spinner = document.querySelector("#loading-spinner");
    let errorIcon = document.querySelector("#error-icon");
    let countText = document.querySelector("#counts");
    let contextText = document.querySelector("#context-title");
    let contextViewProfile = document.querySelector("#context-view-profile");
    let contextProfileImage = document.querySelector("#context-profile-image");


    // Containers
    let memberListContainer = document.querySelector("#member-list");
    let timelineContainer = document.querySelector("#score-container");

    // Vars
    let memberList = [];
    let memberQueue = [];
    let selectedMember = null;
    let showArchive = false;
    let showHold = false;

    refresh();
    function refresh(){
        spinner.classList.add("d-block");
        spinner.classList.remove("d-none");

        const memberListFetch = fetch("/api/interpersonal/member/all", {});
        Promise.all([memberListFetch])
            .then(responses => {
                return Promise.all([responses[0]]);
            })
            .then(data => {
                return Promise.all([data[0].json()]);
            })
            .then(data => {
                memberList = data[0];
                memberQueue = [...data[0]];

                if(memberList.length > 0){
                    chooseNext();
                }

                renderMemberList();

            })
            .catch((response) => {
                errorIcon.classList.add("d-block");
                errorIcon.classList.remove("d-none");
                console.log(response);
                response.json()
                    .then(errorData => {
                        console.log(errorData.message);
                    })
                    .catch(error => {
                        console.error("Error parsing error response:", error);
                    });
            })
            .finally(() => {
                spinner.classList.remove("d-block");
                spinner.classList.add("d-none");
            });
    }

    function getMember(id){
        spinner.classList.add("d-block");
        spinner.classList.remove("d-none");

        const evaluationFetch = fetch("/api/interpersonal/evaluation/all/" + id, {});
        const memberFetch = fetch("/api/interpersonal/member/view/" + id, {});
        Promise.all([evaluationFetch, memberFetch])
            .then(responses => {
                return Promise.all(responses);
            })
            .then(data => {
                return Promise.all([data[0].json(), data[1].json()]);
            })
            .then(data => {
                // combine data sources into one
                let user = data[1];
                user.timeline = data[0];

                selectedMember = user;
            })
            .then(() => {
                renderContextPanel();
            })
            .catch((response) => {
                errorIcon.classList.add("d-block");
                errorIcon.classList.remove("d-none");
                console.log(response);
                response.json()
                    .then(errorData => {
                        console.log(errorData.message);
                    })
                    .catch(error => {
                        console.error("Error parsing error response:", error);
                    });
            })
            .finally(() => {
                spinner.classList.remove("d-block");
                spinner.classList.add("d-none");
            });
    }

    // Rendering functions
    function renderMemberList(){
        let content = ``;
        memberQueue.forEach(member => {
            // Filter out members
            if(!isVisible(member)) {
                return;
            }

            content += `
                <div class="border-bottom d-flex justify-content-between align-items-center p-0 m-0">
                    <div class="d-flex flex-row gap-2 p-2 align-items-center justify-content-start">
                        <img src="/api/interpersonal/member/profile-image/${member.id}" class="square-image img-fluid" style="height: 40px; width: 40px;" alt="profile image" />
                        <p class="fw-bold fs-5 m-0">${member.firstName} ${member.lastName}</p>
                    </div>
                    <button type="button" class="btn-close pe-4" onclick="removeFromQueue('${member.id}')"></button>
                </div>
            `
        });
        memberListContainer.innerHTML = content;
        countText.innerHTML = `${memberQueue.filter((m) => isVisible(m)).length} / ${memberList.length} members`;
    }

    function renderContextPanel(){
        contextText.textContent = `${selectedMember.firstName} ${selectedMember.lastName}`;
        contextViewProfile.href = `/interpersonal/member/view/${selectedMember.id}`;
        contextProfileImage.src = `/api/interpersonal/member/profile-image/${selectedMember.id}`;

        let content = ``;
        selectedMember.timeline.forEach((e) => {
            content += cScoreBox(e);
        });
        timelineContainer.innerHTML = content;

        tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
        tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl))

    }


    // Button Actions
    function removeFromQueue(id){
        memberQueue.splice(getMemberIndex(id), 1);
        renderMemberList();
    }

    document.querySelector('#btn-archive').addEventListener('click', function() {
        showArchive = this.classList.contains('active');
        renderMemberList();
    });

    document.querySelector('#btn-hold').addEventListener('click', function() {
        showHold = this.classList.contains('active');
        renderMemberList()
    });

    // Helper Functions
    function getMemberIndex(id){
        return memberList.findIndex((m) => m.id === id)
    }

    function isVisible(member) {
        if (!member.archive && !member.scoreHold) return true;
        if (showArchive && member.archive) return true;
        if (showHold && member.scoreHold) return true;
        return false;
    }

    function chooseNext(){
        let member = memberQueue.shift();
        getMember(member.id);
        renderMemberList();
    }

    // Re-usable components
    function cScoreBox(eval){
        return `
            <div class="mx-2 d-flex flex-column gap-1 mt-2 align-items-center" data-bs-toggle="tooltip" ${eval.note ? `data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="${eval.note}"` : ''}>
                <div class="position-relative p-0 m-0">
                    <div class="d-flex justify-content-center align-items-center border" style="aspect-ratio: 1/1; width: 70px">
                        <p class="fs-2 fw-bold m-0 text-center">${eval.cscore}</p>
                    </div>
                    <span class="position-absolute translate-middle p-2 bg-info border rounded-circle ${eval.note ? '' : 'd-none'}" style="top:8%; left:92%">
                    <span class="visually-hidden">New alerts</span>
                </span>
                </div>
                <p class="text-center mb-0 mt-1">${formatDate(eval.timestamp)}</p>
                <p class="text-center mb-0">${formatTimeOnly(eval.timestamp)}</p>
            </div>
        `;
    }

</script>
</body>
</html>
