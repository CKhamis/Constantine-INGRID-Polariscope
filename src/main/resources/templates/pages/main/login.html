<!DOCTYPE html>
<html xml:th="https://www.thymeleaf.org">
<head th:replace="~{components/Header :: head('Log In')}"></head>
<body class="stripe-white" data-bs-theme="dark">
<main class="row m-0" style="height: 100vh">
    <div class="d-none d-lg-flex col-12 col-lg-6 overflow-hidden" id="particles-js" style="height: 100vh"></div>
    <div class="col-12 col-lg-6 border-start d-flex flex-column justify-content-between align-items-center px-0" style="background: rgba(0,0,0,.6)">
        <div class="d-flex flex-column justify-content-center align-items-center flex-grow-1 w-100">
            <img src="/icons/Logo.svg" class="square-image mx-auto mb-3" style="width: 120px" />
            <h2 class="text-center mb-4 fw-bold">Polariscope Sign In</h2>
            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                Invalid username and password.
            </div>
            <div th:if="${param.logout}" class="alert alert-danger" role="alert">
                You have been logged out.
            </div>
            <form th:action="@{/login}" method="post" class="w-50">
                <div class="form-group mb-3">
                    <label for="emailInput">Email address</label>
                    <input type="text" class="form-control" id="emailInput" placeholder="Enter email" name="username" required>
                </div>
                <div class="form-group mb-3">
                    <label for="passwordInput">Password</label>
                    <input type="password" class="form-control" id="passwordInput" placeholder="Password" name="password" required>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Sign In</button>
                </div>
            </form>
        </div>
        <div class="bottom-0 w-100 border-top p-2 d-flex flex-column gap-2">
            <div class="d-flex flex-row justify-content-center align-items-center gap-5">
                <a class="text-white" href="https://costionline.com">Costi Online</a>
                <a class="text-white" href="https://constantinekhamis.com">Portfolio</a>
                <a class="text-white" href="https://costionline.com/Projects/Constantine-EventStar-Website">Project Info</a>
            </div>
            <div class="d-flex flex-row justify-content-center align-items-center">
                <p class="text-muted text-center mb-0">Project by Constantine Khamis 2026</p>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{components/External :: external}"></div>
<div th:replace="~{components/External :: particlesjs-login}"></div>
</body>
</html>
